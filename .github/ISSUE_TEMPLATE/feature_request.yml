name: Feature request
description: Suggest a product, DX, or ecosystem improvement for BAP.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain, limitation, or opportunity are you trying to address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the ideal behavior, command, API, or doc improvement.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or competing approaches have you tried?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Browser automation behavior
        - CLI ergonomics
        - MCP integrations
        - TypeScript SDK
        - Python SDK
        - Security / auth
        - Docs / demos
        - Release / packaging
    validations:
      required: true
